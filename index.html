<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人类简史 · 认知革命 — 沉浸式学习引擎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     CSS FOUNDATION
     ═══════════════════════════════════════════ */
  :root {
    --paper: #FAFAF8;
    --charcoal: #1A1A1A;
    --amber: #D4A845;
    --amber-dim: rgba(212, 168, 69, 0.15);
    --amber-mid: rgba(212, 168, 69, 0.4);
    --grey-200: #E5E5E3;
    --grey-400: #9CA3AF;
    --grey-600: #6B7280;
    --serif: 'Noto Serif SC', 'Songti SC', serif;
    --sans: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--sans);
    background-color: var(--paper);
    color: var(--charcoal);
    transition: background-color 1.2s var(--ease-smooth), color 1.2s var(--ease-smooth);
    overflow-x: hidden;
    line-height: 1.8;
  }

  body.dark-mode {
    background-color: var(--charcoal);
    color: var(--paper);
  }

  ::selection {
    background: var(--amber);
    color: var(--charcoal);
  }

  /* ═══════════════════════════════════════════
     SCENE NAV (Right-side dots)
     ═══════════════════════════════════════════ */
  .scene-nav {
    position: fixed;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    opacity: 0;
    transition: opacity 0.6s var(--ease-smooth);
  }
  .scene-nav.visible { opacity: 1; }
  .scene-nav a {
    display: block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--grey-400);
    transition: all 0.4s var(--ease-out);
    position: relative;
  }
  .scene-nav a.active {
    background: var(--amber);
    transform: scale(1.4);
  }
  .scene-nav a::after {
    content: attr(data-label);
    position: absolute;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    color: var(--grey-600);
  }
  .scene-nav a:hover::after { opacity: 1; }
  body.dark-mode .scene-nav a { background: rgba(250,250,248,0.25); }
  body.dark-mode .scene-nav a.active { background: var(--amber); }
  body.dark-mode .scene-nav a::after { color: var(--grey-400); }

  /* ═══════════════════════════════════════════
     PROGRESS BAR
     ═══════════════════════════════════════════ */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--amber);
    z-index: 1000;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ═══════════════════════════════════════════
     HERO SECTION
     ═══════════════════════════════════════════ */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  .hero-overline {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 2rem;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s var(--ease-out) 0.3s forwards;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.2s var(--ease-out) 0.6s forwards;
  }
  .hero-subtitle {
    font-family: var(--serif);
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-weight: 400;
    color: var(--grey-600);
    max-width: 600px;
    margin-bottom: 3rem;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.2s var(--ease-out) 0.9s forwards;
  }
  .hero-part {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--amber);
    border: 1px solid var(--amber-mid);
    padding: 0.5rem 1.5rem;
    border-radius: 2rem;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s var(--ease-out) 1.2s forwards;
  }
  .hero-scroll-hint {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s var(--ease-out) 1.8s forwards;
  }
  .hero-scroll-hint span {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--grey-400);
  }
  .scroll-arrow {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--amber), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  /* ═══════════════════════════════════════════
     SCENE SECTIONS
     ═══════════════════════════════════════════ */
  .scene {
    min-height: 100vh;
    padding: 8rem 1.5rem;
    position: relative;
  }
  .scene-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  .scene-number {
    font-family: var(--sans);
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    color: var(--amber);
    margin-bottom: 1rem;
  }
  .scene-title {
    font-family: var(--serif);
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.75rem;
  }
  .scene-subtitle {
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--grey-400);
    margin-bottom: 4rem;
    text-transform: uppercase;
  }

  /* Hero Quote */
  .hero-quote {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    line-height: 1.6;
    font-weight: 400;
    margin-bottom: 4rem;
    padding: 3rem 0;
    border-top: 1px solid var(--amber-mid);
    border-bottom: 1px solid var(--amber-mid);
    position: relative;
  }
  .hero-quote::before {
    content: '"';
    font-family: var(--serif);
    font-size: 5rem;
    color: var(--amber);
    opacity: 0.3;
    position: absolute;
    top: 1rem;
    left: -0.5rem;
    line-height: 1;
  }

  /* Narrative paragraphs */
  .narrative p {
    font-size: 1.05rem;
    line-height: 2;
    margin-bottom: 1.8rem;
    color: inherit;
    opacity: 0.88;
  }
  .narrative p strong,
  .narrative p b {
    color: var(--amber);
    font-weight: 500;
  }

  /* ═══════════════════════════════════════════
     REVEAL ANIMATIONS
     ═══════════════════════════════════════════ */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out);
  }
  .reveal.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal-delay-1 { transition-delay: 0.12s; }
  .reveal-delay-2 { transition-delay: 0.24s; }
  .reveal-delay-3 { transition-delay: 0.36s; }
  .reveal-delay-4 { transition-delay: 0.48s; }

  /* Clip-path wipe for quotes */
  .reveal-wipe {
    clip-path: inset(0 100% 0 0);
    transition: clip-path 1.4s var(--ease-out);
  }
  .reveal-wipe.revealed {
    clip-path: inset(0 0% 0 0);
  }

  /* ═══════════════════════════════════════════
     DEEP DIVE CARDS
     ═══════════════════════════════════════════ */
  .deep-dive-section {
    margin-top: 4rem;
    padding-top: 3rem;
    border-top: 1px solid var(--grey-200);
  }
  body.dark-mode .deep-dive-section { border-color: rgba(250,250,248,0.1); }

  .deep-dive-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--amber);
    margin-bottom: 1.5rem;
  }
  .deep-dive-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .dd-card {
    border-left: 3px solid var(--amber);
    background: var(--amber-dim);
    border-radius: 0 8px 8px 0;
    overflow: hidden;
    transition: background 0.3s;
    cursor: pointer;
  }
  body.dark-mode .dd-card {
    background: rgba(212, 168, 69, 0.08);
  }
  .dd-card:hover {
    background: rgba(212, 168, 69, 0.22);
  }
  body.dark-mode .dd-card:hover {
    background: rgba(212, 168, 69, 0.15);
  }

  .dd-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    user-select: none;
  }
  .dd-header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .dd-icon { font-size: 1.3rem; }
  .dd-title {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 700;
  }
  .dd-chevron {
    font-size: 0.8rem;
    color: var(--amber);
    transition: transform 0.4s var(--ease-out);
  }
  .dd-card.open .dd-chevron {
    transform: rotate(180deg);
  }

  .dd-body {
    height: 0;
    overflow: hidden;
    transition: height 0.5s var(--ease-out);
  }
  .dd-body-inner {
    padding: 0 1.5rem 1.5rem;
  }

  /* Logic Chain */
  .logic-chain {
    position: relative;
    padding-left: 1.5rem;
  }
  .logic-chain::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.5rem;
    bottom: 0.5rem;
    width: 2px;
    background: linear-gradient(to bottom, var(--amber), var(--amber-mid), transparent);
  }
  .chain-step {
    margin-bottom: 1.25rem;
    position: relative;
  }
  .chain-step::before {
    content: '';
    position: absolute;
    left: -1.5rem;
    top: 0.6rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--amber);
    border: 2px solid var(--paper);
  }
  body.dark-mode .chain-step::before {
    border-color: var(--charcoal);
  }
  .chain-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--amber);
    background: var(--amber-dim);
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 2px;
    margin-bottom: 0.4rem;
  }
  .chain-text {
    font-size: 0.9rem;
    line-height: 1.8;
    opacity: 0.9;
  }

  /* ═══════════════════════════════════════════
     COMPARISON MODULE
     ═══════════════════════════════════════════ */
  .comparison-section {
    margin-top: 4rem;
    padding: 3rem 0;
  }
  .comparison-toggle {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 3rem;
    border: 1px solid var(--grey-200);
    border-radius: 8px;
    overflow: hidden;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }
  .toggle-btn {
    flex: 1;
    padding: 0.75rem 1rem;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    border: none;
    background: transparent;
    color: var(--grey-600);
    cursor: pointer;
    transition: all 0.3s var(--ease-out);
    min-height: 44px;
  }
  .toggle-btn.active {
    background: var(--amber);
    color: var(--charcoal);
    font-weight: 600;
  }

  .comparison-rows {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .comp-row-label {
    font-family: var(--serif);
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .comp-bars {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .comp-bar-wrapper {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .comp-bar-tag {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    width: 2.5rem;
    text-align: right;
    color: var(--grey-400);
    flex-shrink: 0;
  }
  .comp-bar-track {
    flex: 1;
    height: 8px;
    background: var(--grey-200);
    border-radius: 4px;
    overflow: hidden;
  }
  body.dark-mode .comp-bar-track { background: rgba(250,250,248,0.08); }
  .comp-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s var(--ease-out);
    width: 0%;
  }
  .comp-bar-fill.amber { background: var(--amber); }
  .comp-bar-fill.grey { background: var(--grey-400); }
  .comp-bar-value {
    font-size: 0.7rem;
    font-weight: 600;
    width: 2rem;
    color: var(--grey-600);
    flex-shrink: 0;
  }
  .comp-text {
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--grey-600);
    margin-top: 0.35rem;
  }
  body.dark-mode .comp-text { color: var(--grey-400); }

  /* ═══════════════════════════════════════════
     EXTINCTION VISUALIZATION
     ═══════════════════════════════════════════ */
  .extinction-section {
    margin-top: 4rem;
  }
  .extinction-region {
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(250,250,248,0.08);
  }
  .extinction-region:last-child { border-bottom: none; }
  .ext-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }
  .ext-region-name {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 700;
  }
  .ext-arrival {
    font-size: 0.7rem;
    color: var(--amber);
    font-weight: 500;
    letter-spacing: 0.1em;
  }
  .ext-species {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin: 1rem 0;
  }
  .ext-species-icon {
    font-size: 1.5rem;
    position: relative;
    transition: all 0.5s var(--ease-out);
  }
  .ext-species-icon.extinct::after {
    content: '';
    position: absolute;
    left: -2px;
    right: -2px;
    top: 50%;
    height: 2px;
    background: #E53E3E;
    transform: rotate(-45deg);
  }
  .ext-bar-wrapper {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.75rem;
  }
  .ext-bar-label {
    font-size: 0.7rem;
    color: var(--grey-400);
    width: 4rem;
    flex-shrink: 0;
  }
  .ext-bar-track {
    flex: 1;
    height: 12px;
    background: rgba(250,250,248,0.06);
    border-radius: 6px;
    overflow: hidden;
  }
  .ext-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), #E53E3E);
    border-radius: 6px;
    width: 0%;
    transition: width 1.5s var(--ease-out);
  }
  .ext-percent {
    font-size: 1.1rem;
    font-weight: 700;
    color: #E53E3E;
    width: 3.5rem;
    text-align: right;
    flex-shrink: 0;
  }
  .ext-percent .counter { font-variant-numeric: tabular-nums; }
  .ext-note {
    font-size: 0.78rem;
    color: var(--grey-400);
    margin-top: 0.5rem;
    line-height: 1.6;
  }

  /* ═══════════════════════════════════════════
     SECTION DIVIDER
     ═══════════════════════════════════════════ */
  .scene-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 0;
  }
  .scene-divider span {
    display: block;
    width: 60px;
    height: 1px;
    background: var(--amber-mid);
  }

  /* ═══════════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════════ */
  .footer {
    text-align: center;
    padding: 6rem 2rem;
    border-top: 1px solid var(--grey-200);
  }
  body.dark-mode .footer { border-color: rgba(250,250,248,0.08); }
  .footer-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    margin-bottom: 1rem;
  }
  .footer-text {
    font-size: 0.85rem;
    color: var(--grey-400);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.8;
  }

  /* ═══════════════════════════════════════════
     KEYFRAMES
     ═══════════════════════════════════════════ */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.3); }
  }

  /* ═══════════════════════════════════════════
     REDUCED MOTION
     ═══════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    .reveal { opacity: 1; transform: none; }
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════ */
  @media (max-width: 768px) {
    .scene { padding: 5rem 1.25rem; }
    .scene-nav { display: none; }
    .hero-quote { font-size: 1.2rem; padding: 2rem 0; }
    .hero-quote::before { font-size: 3rem; }
    .dd-header { padding: 1rem 1.25rem; }
    .dd-body-inner { padding: 0 1.25rem 1.25rem; }
    .comparison-toggle { max-width: 100%; }
  }

  @media (min-width: 1024px) {
    .deep-dive-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Scene navigation dots -->
<nav class="scene-nav" id="sceneNav"></nav>

<!-- Content rendered by JS engine -->
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONTENT_DATA — The single source of truth for all content.
// Swap this object to power a different book/part.
// ═══════════════════════════════════════════════════════════════
const CONTENT_DATA = {
  meta: {
    book: '人类简史',
    bookSub: 'SAPIENS: A Brief History of Humankind',
    part: '第一部分',
    partTitle: '认知革命',
    partSub: 'THE COGNITIVE REVOLUTION',
    author: '尤瓦尔·赫拉利',
    colors: { paper: '#FAFAF8', charcoal: '#1A1A1A', amber: '#D4A845' }
  },

  scenes: [
    // ─────────────────────────────────────────
    // SCENE 1
    // ─────────────────────────────────────────
    {
      id: 'scene-1',
      number: '场景 01',
      title: '一种也没什么特别的动物',
      subtitle: 'AN ANIMAL OF NO SIGNIFICANCE',
      dark: false,
      heroQuote: '在距今约七万年前，智人不过是一种微不足道的动物，在非洲的一个小角落里过着自己的日子。',
      narrative: [
        '让我们从一个令人不安的事实开始：<b>在大约两百万年的时间里，人类不过是一种普通的中等体型动物</b>。我们的祖先在东非大草原上四处张望，采集果实，捕捉昆虫，同时小心翼翼地躲避更大的捕食者。没有任何迹象表明他们将会主宰世界。',

            premise: '恐惧是进化习得的。一种动物必须经历足够多代与捕食者的共存，才能进化出对该捕食者的回避本能。',
            evidence: '非洲和亚洲的动物与人属物种共存了超过200万年，逐渐学会了恐惧人类。但澳大利亚、美洲、马达加斯加、新西兰的动物从未见过人类。当代研究人员在加拉帕戈斯群岛和南极洲观察到相似现象：那里的动物对人类毫无恐惧，可以被轻易接近。',
            conclusion: '"生态天真"（ecological naivety）解释了为什么非洲仍有大象和犀牛，而其他大陆的巨兽却几乎全部灭绝。这不是因为非洲人更"和谐"，而是因为非洲的动物有足够的时间学会逃跑。历史的残酷教训是：与人类的第一次接触，往往就是最后一次。'
          }
        }
      ]
    }
  ]
};


// ═══════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════
const app = document.getElementById('app');
const sceneNav = document.getElementById('sceneNav');

function renderApp() {
  const { meta, scenes } = CONTENT_DATA;
  let html = '';

  // ── Hero ──
  html += `
    <section class="hero" id="hero">
      <div class="hero-overline">${meta.author} · ${meta.bookSub}</div>
      <h1 class="hero-title">${meta.book}</h1>
      <p class="hero-subtitle">${meta.partTitle}</p>
      <div class="hero-part">${meta.part} · ${meta.partSub}</div>
      <div class="hero-scroll-hint">
        <span>向下滚动</span>
        <div class="scroll-arrow"></div>
      </div>
    </section>
  `;

  // ── Scenes ──
  scenes.forEach((scene, idx) => {
    html += `<section class="scene ${scene.dark ? 'scene-dark' : ''}" id="${scene.id}" data-dark="${scene.dark}">`;
    html += `<div class="scene-inner">`;

    // Number + Title
    html += `
      <div class="reveal scene-number">${scene.number}</div>
      <h2 class="reveal scene-title reveal-delay-1">${scene.title}</h2>
      <div class="reveal scene-subtitle reveal-delay-2">${scene.subtitle}</div>
    `;

    // Hero Quote
    html += `
      <blockquote class="hero-quote reveal-wipe">${scene.heroQuote}</blockquote>
    `;

    // Narrative
    html += `<div class="narrative">`;
    scene.narrative.forEach(p => {
      html += `<p class="reveal">${p}</p>`;
    });
    html += `</div>`;

    // Comparison Module (Scene 3)
    if (scene.comparison) {
      html += renderComparison(scene.comparison);
    }

    // Extinction Visualization (Scene 4)
    if (scene.extinction) {
      html += renderExtinction(scene.extinction);
    }

    // Deep Dives
    if (scene.deepDives && scene.deepDives.length > 0) {
      html += `
        <div class="deep-dive-section reveal">
          <div class="deep-dive-label">深度解析 · DEEP DIVE</div>
          <div class="deep-dive-grid">
      `;
      scene.deepDives.forEach((dd, i) => {
        html += `
          <div class="dd-card reveal reveal-delay-${i + 1}" data-dd>
            <div class="dd-header">
              <div class="dd-header-left">
                <span class="dd-icon">${dd.icon}</span>
                <span class="dd-title">${dd.title}</span>
              </div>
              <span class="dd-chevron">▾</span>
            </div>
            <div class="dd-body">
              <div class="dd-body-inner">
                <div class="logic-chain">
                  <div class="chain-step">
                    <div class="chain-label">前 提</div>
                    <div class="chain-text">${dd.chain.premise}</div>
                  </div>
                  <div class="chain-step">
                    <div class="chain-label">证 据</div>
                    <div class="chain-text">${dd.chain.evidence}</div>
                  </div>
                  <div class="chain-step">
                    <div class="chain-label">结 论</div>
                    <div class="chain-text">${dd.chain.conclusion}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      });
      html += `</div></div>`;
    }

    // Divider between scenes
    if (idx < scenes.length - 1) {
      html += `<div class="scene-divider"><span></span></div>`;
    }

    html += `</div></section>`;
  });

  // ── Footer ──
  html += `
    <footer class="footer">
      <div class="footer-title">第一部分 · 终</div>
      <p class="footer-text">
        认知革命使智人从一种普通的动物变成了世界的主宰。
        但真正的问题是：我们用这种力量创造的世界，是否让我们更加幸福？
      </p>
      <p class="footer-text" style="margin-top:1.5rem; color: var(--amber); font-size: 0.75rem; letter-spacing: 0.15em;">
        第二部分 · 农业革命 · 即将到来
      </p>
    </footer>
  `;

  app.innerHTML = html;

  // ── Scene Nav ──
  let navHtml = '';
  scenes.forEach(scene => {
    navHtml += `<a href="#${scene.id}" data-scene="${scene.id}" data-label="${scene.title}"></a>`;
  });
  sceneNav.innerHTML = navHtml;

  // Initialize interactions after render
  initScrollSystem();
  initDeepDiveCards();
  initComparison();
}

// ── Comparison Module Renderer ──
function renderComparison(comp) {
  let html = `
    <div class="comparison-section reveal">
      <div class="deep-dive-label">生活质量对比 · QUALITY OF LIFE</div>
      <div class="comparison-toggle" id="compToggle">
        <button class="toggle-btn active" data-mode="foraging">采集生活</button>
        <button class="toggle-btn" data-mode="farming">农耕生活</button>
        <button class="toggle-btn" data-mode="compare">对比</button>
      </div>
      <div class="comparison-rows" id="compRows">
  `;

  comp.dimensions.forEach((dim, i) => {
    html += `
      <div class="comp-row reveal reveal-delay-${Math.min(i + 1, 4)}" data-comp-row>
        <div class="comp-row-label">${dim.label}</div>
        <div class="comp-bars">
          <div class="comp-bar-wrapper" data-bar="foraging">
            <span class="comp-bar-tag">采集</span>
            <div class="comp-bar-track">
              <div class="comp-bar-fill amber" data-score="${dim.foraging.score}"></div>
            </div>
            <span class="comp-bar-value">${dim.foraging.score}/10</span>
          </div>
          <div class="comp-bar-wrapper" data-bar="farming" style="display:none;">
            <span class="comp-bar-tag">农耕</span>
            <div class="comp-bar-track">
              <div class="comp-bar-fill grey" data-score="${dim.farming.score}"></div>
            </div>
            <span class="comp-bar-value">${dim.farming.score}/10</span>
          </div>
        </div>
        <div class="comp-text" data-text-foraging>${dim.foraging.text}</div>
        <div class="comp-text" data-text-farming style="display:none;">${dim.farming.text}</div>
      </div>
    `;
  });

  html += `</div></div>`;
  return html;
}

// ── Extinction Visualization Renderer ──
function renderExtinction(ext) {
  let html = `
    <div class="extinction-section">
      <div class="deep-dive-label reveal">灭绝档案 · EXTINCTION RECORD</div>
  `;

  ext.regions.forEach((region, i) => {
    html += `
      <div class="extinction-region reveal" data-ext-region data-delay="${i * 600}" data-percent="${region.percentLost}">
        <div class="ext-header">
          <span class="ext-region-name">${region.name}</span>
          <span class="ext-arrival">智人到达：${region.arrival}</span>
        </div>
        <div class="ext-species">
          ${region.species.map((s, j) => `
            <span class="ext-species-icon" data-ext-species data-delay="${j * 120}" title="${s.name} · ${s.weight}">${s.icon}</span>
          `).join('')}
        </div>
        <div class="ext-bar-wrapper">
          <span class="ext-bar-label">灭绝率</span>
          <div class="ext-bar-track">
            <div class="ext-bar-fill" data-ext-fill data-target="${region.percentLost}"></div>
          </div>
          <span class="ext-percent"><span class="counter" data-ext-counter data-target="${region.percentLost}">0</span>%</span>
        </div>
        <div class="ext-note">${region.note}</div>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}


// ═══════════════════════════════════════════════════════════════
// SCROLL SYSTEM
// ═══════════════════════════════════════════════════════════════
function initScrollSystem() {
  const scenes = document.querySelectorAll('.scene');
  const navLinks = document.querySelectorAll('.scene-nav a');
  const progressBar = document.getElementById('progressBar');
  const nav = document.getElementById('sceneNav');

  // ── Tier 1: Scene Observer (background + nav) ──
  const sceneObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const isDark = entry.target.dataset.dark === 'true';
        document.body.classList.toggle('dark-mode', isDark);

        // Update nav
        navLinks.forEach(link => {
          link.classList.toggle('active', link.dataset.scene === entry.target.id);
        });
      }
    });
  }, { threshold: 0.15 });

  scenes.forEach(s => sceneObserver.observe(s));

  // ── Fallback: scroll-based dark mode check ──
  // Handles edge cases where IntersectionObserver doesn't fire (e.g., instant scrollTo)
  function checkDarkMode() {
    const viewMid = window.scrollY + window.innerHeight / 2;
    let activeDark = false;
    scenes.forEach(s => {
      const top = s.offsetTop;
      const bottom = top + s.offsetHeight;
      if (viewMid >= top && viewMid <= bottom) {
        activeDark = s.dataset.dark === 'true';
        navLinks.forEach(link => {
          link.classList.toggle('active', link.dataset.scene === s.id);
        });
      }
    });
    document.body.classList.toggle('dark-mode', activeDark);
  }

  // ── Tier 2: Reveal Observer (one-shot animations) ──
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal, .reveal-wipe').forEach(el => {
    revealObserver.observe(el);
  });

  // ── Tier 2b: Extinction region observer ──
  const extObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        animateExtinctionRegion(entry.target);
        extObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });

  document.querySelectorAll('[data-ext-region]').forEach(el => {
    extObserver.observe(el);
  });

  // ── Tier 2c: Comparison bars observer ──
  const compObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        animateCompBars();
        compObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });

  const compSection = document.querySelector('.comparison-section');
  if (compSection) compObserver.observe(compSection);

  // ── Tier 3: Scroll progress + nav visibility ──
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = (scrollTop / docHeight) * 100;
        progressBar.style.width = progress + '%';

        // Show nav after scrolling past hero
        nav.classList.toggle('visible', scrollTop > window.innerHeight * 0.5);

        // Dark mode fallback check
        checkDarkMode();

        ticking = false;
      });
      ticking = true;
    }
  });
}


// ═══════════════════════════════════════════════════════════════
// DEEP DIVE CARDS
// ═══════════════════════════════════════════════════════════════
function initDeepDiveCards() {
  document.querySelectorAll('[data-dd]').forEach(card => {
    const header = card.querySelector('.dd-header');
    const body = card.querySelector('.dd-body');

    header.addEventListener('click', () => {
      const isOpen = card.classList.contains('open');

      if (isOpen) {
        // Collapse
        body.style.height = body.scrollHeight + 'px';
        requestAnimationFrame(() => {
          body.style.height = '0px';
        });
        card.classList.remove('open');
      } else {
        // Expand
        body.style.height = body.scrollHeight + 'px';
        card.classList.add('open');

        const onEnd = () => {
          body.style.height = 'auto';
          body.removeEventListener('transitionend', onEnd);
        };
        body.addEventListener('transitionend', onEnd);
      }
    });
  });
}


// ═══════════════════════════════════════════════════════════════
// COMPARISON MODULE
// ═══════════════════════════════════════════════════════════════
let currentCompMode = 'foraging';

function initComparison() {
  const toggle = document.getElementById('compToggle');
  if (!toggle) return;

  toggle.addEventListener('click', (e) => {
    const btn = e.target.closest('.toggle-btn');
    if (!btn) return;

    const mode = btn.dataset.mode;
    currentCompMode = mode;

    // Update active button
    toggle.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    updateCompBars(mode);
  });
}

function updateCompBars(mode) {
  document.querySelectorAll('[data-comp-row]').forEach(row => {
    const foragingBar = row.querySelector('[data-bar="foraging"]');
    const farmingBar = row.querySelector('[data-bar="farming"]');
    const foragingText = row.querySelector('[data-text-foraging]');
    const farmingText = row.querySelector('[data-text-farming]');

    if (mode === 'foraging') {
      foragingBar.style.display = 'flex';
      farmingBar.style.display = 'none';
      foragingText.style.display = 'block';
      farmingText.style.display = 'none';
    } else if (mode === 'farming') {
      foragingBar.style.display = 'none';
      farmingBar.style.display = 'flex';
      foragingText.style.display = 'none';
      farmingText.style.display = 'block';
    } else {
      foragingBar.style.display = 'flex';
      farmingBar.style.display = 'flex';
      foragingText.style.display = 'block';
      farmingText.style.display = 'block';
    }
  });

  animateCompBars();
}

function animateCompBars() {
  document.querySelectorAll('.comp-bar-fill').forEach(bar => {
    const score = parseInt(bar.dataset.score);
    const wrapper = bar.closest('.comp-bar-wrapper');
    if (wrapper.style.display === 'none') return;

    bar.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bar.style.width = (score / 10 * 100) + '%';
      });
    });
  });
}


// ═══════════════════════════════════════════════════════════════
// EXTINCTION ANIMATION
// ═══════════════════════════════════════════════════════════════
function animateExtinctionRegion(region) {
  const delay = parseInt(region.dataset.delay) || 0;

  setTimeout(() => {
    // Animate bar fill
    const fill = region.querySelector('[data-ext-fill]');
    const target = parseInt(fill.dataset.target);
    fill.style.width = target + '%';

    // Animate counter
    const counter = region.querySelector('[data-ext-counter]');
    const counterTarget = parseInt(counter.dataset.target);
    animateCounter(counter, 0, counterTarget, 1500);

    // Animate species icons
    const icons = region.querySelectorAll('[data-ext-species]');
    icons.forEach((icon, i) => {
      const iconDelay = parseInt(icon.dataset.delay) || 0;
      setTimeout(() => {
        icon.classList.add('extinct');
      }, 800 + iconDelay);
    });
  }, delay);
}

function animateCounter(el, from, to, duration) {
  const startTime = performance.now();

  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease out
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(from + (to - from) * eased);
    el.textContent = current;

    if (progress < 1) {
      requestAnimationFrame(tick);
    }
  }

  requestAnimationFrame(tick);
}


// ═══════════════════════════════════════════════════════════════
// INITIALIZE
// ═══════════════════════════════════════════════════════════════
renderApp();
</script>
